<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Project Case Study</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html{scroll-behavior:smooth}body{overflow-x:hidden}.reveal{opacity:0;transform:translateY(18px);transition:opacity .4s ease,transform .4s ease}.reveal.show{opacity:1;transform:none}.progress{position:fixed;top:0;left:0;height:2px;background:#f97316;z-index:60;width:0}.media-card{overflow:hidden;border:1px solid rgba(255,255,255,.1);background:#111;border-radius:1.75rem}.media-card img{width:100%;height:100%;object-fit:cover;transition:transform .35s cubic-bezier(.2,.8,.2,1)}.media-card:hover img{transform:scale(1.025)}.parallax{will-change:transform}.safe-x{padding-left:max(1.5rem,env(safe-area-inset-left));padding-right:max(1.5rem,env(safe-area-inset-right))}@media(max-width:1024px){.media-card{border-radius:1.35rem}.parallax{transform:none!important}}@media(max-width:768px){.safe-x{padding-left:max(1rem,env(safe-area-inset-left));padding-right:max(1rem,env(safe-area-inset-right))}.media-card{border-radius:1rem}}@media(hover:none),(pointer:coarse){.media-card:hover img{transform:none}}@media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;animation-duration:.01ms!important;transition-duration:.01ms!important}.reveal{opacity:1;transform:none}.parallax{transform:none!important}}
  </style>
</head>
<body class="bg-[#0A0A0A] text-white antialiased selection:bg-orange-500 selection:text-white">
  <div id="progress" class="progress"></div>
  <nav class="fixed top-0 inset-x-0 z-50 border-b border-white/10 bg-black/70 backdrop-blur-xl">
    <div class="max-w-7xl mx-auto safe-x h-16 flex items-center justify-between gap-4">
      <a href="index.html" class="text-xs sm:text-sm font-semibold tracking-[0.14em] sm:tracking-[0.18em] uppercase">Kreangkrai</a>
      <a href="index.html#work" class="text-[10px] sm:text-xs uppercase tracking-[0.14em] sm:tracking-[0.18em] text-white/60 hover:text-white transition">← Back to work</a>
    </div>
  </nav>
  <main id="app" class="pt-16"></main>
  <template id="not-found"><section class="min-h-[80vh] flex items-center justify-center safe-x text-center"><div><p class="text-orange-400 text-xs uppercase tracking-[0.2em]">Project not found</p><h1 class="text-4xl md:text-6xl font-black mt-4">ยังไม่พบโปรเจกต์นี้</h1><a href="index.html" class="inline-block mt-8 px-6 py-3 rounded-full border border-white/20 hover:border-white transition">กลับหน้าแรก</a></div></section></template>
  <script>
    const params=new URLSearchParams(location.search);const slug=params.get('project');
    const shell='max-w-7xl mx-auto safe-x';
    function fallbackVisual(project){return `<div class="aspect-[4/3] sm:aspect-[16/10] rounded-2xl md:rounded-[2rem] border border-white/10 bg-gradient-to-br from-zinc-800 via-zinc-950 to-black overflow-hidden flex items-end p-6 sm:p-8 md:p-12"><div><p class="text-xs uppercase tracking-[0.22em] text-orange-400">${project.category||'Selected Work'}</p><p class="text-3xl sm:text-4xl md:text-6xl font-black mt-3">${project.title}</p></div></div>`}
    function galleryMarkup(project){const gallery=Array.isArray(project.gallery)?project.gallery:[];if(!gallery.length)return'';return `<section class="${shell} pb-20 md:pb-32"><div class="grid grid-cols-1 md:grid-cols-12 gap-4 md:gap-5">${gallery.map((src,i)=>{const layout=i%3===0?'md:col-span-12 aspect-[4/3] sm:aspect-[16/9]':i%3===1?'md:col-span-7 aspect-[4/3]':'md:col-span-5 aspect-[4/3]';return `<div class="media-card ${layout} reveal"><img src="${src}" alt="${project.title} gallery ${i+1}" loading="lazy" onerror="this.closest('.media-card').style.display='none'"></div>`}).join('')}</div></section>`}
    function renderProject(project,projects){document.title=`${project.title} — Kreangkrai Portfolio`;const current=projects.findIndex(p=>(p.slug||String(p.id))===(project.slug||String(project.id)));const next=projects[(current+1)%projects.length];const role=project.role||'Visual Design / Creative Production';const tools=project.tools||'Adobe Creative Cloud';const year=project.year||'2026';const overview=project.overview||project.description||'';const process=project.process||'';const image=project.image_url?`<div class="aspect-[4/3] sm:aspect-[16/10] rounded-2xl md:rounded-[2rem] overflow-hidden border border-white/10 bg-zinc-900"><img src="${project.image_url}" alt="${project.title}" class="w-full h-full object-cover parallax" onerror="this.parentElement.outerHTML=window.__fallback"></div>`:fallbackVisual(project);window.__fallback=fallbackVisual(project).replace(/`/g,'');const video=project.video_url?`<section class="${shell} pb-20 md:pb-24 reveal"><a href="${project.video_url}" target="_blank" rel="noreferrer" class="group block rounded-2xl md:rounded-[2rem] border border-white/10 bg-white/[0.03] p-6 sm:p-8 md:p-12 hover:border-orange-400/60 transition"><p class="text-xs uppercase tracking-[0.22em] text-orange-400">Motion Preview</p><div class="mt-5 sm:mt-6 flex items-end justify-between gap-6"><h2 class="text-2xl sm:text-4xl md:text-6xl font-black tracking-tight">Watch the full project</h2><span class="text-3xl md:text-4xl">↗</span></div></a></section>`:'';
      document.getElementById('app').innerHTML=`<section class="${shell} pt-12 sm:pt-16 md:pt-24 pb-10 sm:pb-12 reveal"><div class="grid md:grid-cols-12 gap-6 md:gap-8 items-end"><div class="md:col-span-8"><p class="text-orange-400 text-[10px] sm:text-xs uppercase tracking-[0.2em] sm:tracking-[0.22em]">${project.category||'Selected Work'}</p><h1 class="text-4xl sm:text-6xl md:text-8xl font-black leading-[0.94] tracking-tight mt-4 sm:mt-5 break-words">${project.title}</h1></div><div class="md:col-span-4 md:pb-2"><p class="text-sm sm:text-base text-white/55 leading-relaxed">${project.description||overview}</p></div></div></section><section class="${shell} reveal">${image}</section><section class="${shell} py-16 sm:py-20 md:py-28 reveal"><div class="grid md:grid-cols-12 gap-8 md:gap-10"><div class="md:col-span-4 grid grid-cols-2 gap-5 sm:gap-6 text-sm self-start"><div><p class="text-white/35 uppercase text-[10px] tracking-[0.18em]">Role</p><p class="mt-2 text-white/80">${role}</p></div><div><p class="text-white/35 uppercase text-[10px] tracking-[0.18em]">Year</p><p class="mt-2 text-white/80">${year}</p></div><div class="col-span-2"><p class="text-white/35 uppercase text-[10px] tracking-[0.18em]">Tools</p><p class="mt-2 text-white/80 leading-relaxed">${tools}</p></div></div><div class="md:col-span-7 md:col-start-6"><p class="text-xs uppercase tracking-[0.22em] text-orange-400">Overview</p><p class="text-xl sm:text-2xl md:text-4xl leading-tight font-semibold mt-4 sm:mt-5">${overview}</p></div></div></section><section class="border-y border-white/10 bg-white/[0.025] reveal"><div class="${shell} py-16 sm:py-20 md:py-28 grid md:grid-cols-12 gap-8 md:gap-10"><div class="md:col-span-4"><p class="text-xs uppercase tracking-[0.22em] text-orange-400">Process</p><h2 class="text-3xl sm:text-4xl md:text-6xl font-black mt-4">How the work was built.</h2></div><div class="md:col-span-6 md:col-start-7"><p class="text-base sm:text-lg md:text-2xl text-white/65 leading-relaxed">${process}</p></div></div></section>${galleryMarkup(project)}${video}<section class="${shell} py-20 sm:py-24 md:py-32 reveal"><p class="text-xs uppercase tracking-[0.22em] text-white/35">Next project</p><a href="project.html?project=${encodeURIComponent(next.slug||next.id)}" class="group block mt-5 sm:mt-6"><div class="flex justify-between gap-5 sm:gap-8 items-end border-b border-white/15 pb-6 sm:pb-8 group-hover:border-orange-400 transition"><h2 class="text-3xl sm:text-5xl md:text-7xl font-black tracking-tight break-words">${next.title}</h2><span class="text-2xl sm:text-3xl">→</span></div></a></section>`;
      const io=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('show');io.unobserve(e.target)}}),{threshold:.1});document.querySelectorAll('.reveal').forEach(el=>io.observe(el));requestAnimationFrame(()=>document.querySelector('.reveal')?.classList.add('show'));
    }
    fetch('./projects.json',{cache:'no-store'}).then(r=>r.json()).then(projects=>{const project=projects.find(p=>(p.slug||String(p.id))===slug)||projects[0];if(!project)return document.getElementById('app').append(document.getElementById('not-found').content.cloneNode(true));renderProject(project,projects)}).catch(()=>document.getElementById('app').append(document.getElementById('not-found').content.cloneNode(true)));
    let ticking=false;addEventListener('scroll',()=>{if(ticking)return;ticking=true;requestAnimationFrame(()=>{const max=document.documentElement.scrollHeight-innerHeight;document.getElementById('progress').style.width=(max?scrollY/max*100:0)+'%';if(matchMedia('(min-width:1025px) and (hover:hover) and (pointer:fine)').matches){document.querySelectorAll('.parallax').forEach(el=>{const r=el.getBoundingClientRect();if(r.bottom>0&&r.top<innerHeight)el.style.transform=`translateY(${(r.top-innerHeight/2)*-.018}px) scale(1.02)`})}ticking=false})},{passive:true});
  </script>
</body>
</html>
